# Grep Then Read Verify

## Action
Always follow the pattern: Grep to locate → Read to understand → Verify before acting.
Never edit code without first understanding its context and dependencies.

## Evidence
- Detected in 90% of exploration sessions across 3+ projects
- Prevents regressions from blind edits
- Cross-project pattern with high confidence
