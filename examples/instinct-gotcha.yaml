## Problem
useSearchParams() and similar client hooks crash without proper boundary wrapper in Next.js 14+ App Router.

## Fix
Wrap component in `<Suspense fallback={<Loading/>}>`.

## Prevention
Always check if a client hook requires a boundary before using it.
